<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nerdy Jump — Original Vertical Jumper</title>
  <style>
    :root { --ink:#24304a; --cream:#fff8e8; --mint:#78d6b0; --coral:#ff7d6e; --gold:#f4c95d; --sky:#7cc9ff; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; overflow:hidden; background:#93d7ff; font-family: ui-rounded, "Trebuchet MS", system-ui, sans-serif; color:var(--ink); }
    body { display:grid; place-items:center; }
    #wrap { position:relative; width:min(100vw, 520px); height:100vh; max-height:920px; background:linear-gradient(#83d8ff, #ddf8ff 55%, #fff6df); box-shadow:0 0 0 8px rgba(255,255,255,.35), 0 28px 80px rgba(27,66,105,.35); overflow:hidden; }
    canvas { width:100%; height:100%; display:block; image-rendering:auto; }
    .hud { position:absolute; inset:0; pointer-events:none; }
    .score { position:absolute; top:14px; left:16px; padding:8px 12px; border:3px solid var(--ink); border-radius:14px; background:rgba(255,248,232,.86); box-shadow:4px 5px 0 rgba(36,48,74,.15); font-weight:900; font-size:22px; letter-spacing:.5px; }
    .game-title { position:absolute; top:13px; left:50%; transform:translateX(-50%); padding:7px 16px; border:3px solid var(--ink); border-radius:18px; background:rgba(255,248,232,.9); box-shadow:4px 5px 0 rgba(36,48,74,.15); font-weight:1000; font-size:22px; letter-spacing:.2px; white-space:nowrap; }
    .help { position:absolute; right:14px; top:16px; text-align:right; font-size:13px; font-weight:800; line-height:1.25; opacity:.75; text-shadow:0 1px 0 #fff; }
    .overlay { position:absolute; inset:0; display:grid; place-items:center; padding:28px; background:linear-gradient(rgba(255,248,232,.25), rgba(125,216,255,.35)); pointer-events:auto; }
    .card { max-width:420px; padding:24px 24px 22px; border:4px solid var(--ink); border-radius:28px; background:rgba(255,248,232,.94); box-shadow:8px 10px 0 rgba(36,48,74,.20); text-align:center; }
    h1 { margin:0 0 6px; font-size:40px; letter-spacing:-1px; }
    p { margin:8px 0; font-weight:700; }
    button { cursor:pointer; margin-top:14px; font:900 18px ui-rounded, "Trebuchet MS", system-ui, sans-serif; color:var(--ink); background:var(--gold); border:3px solid var(--ink); border-radius:16px; padding:12px 18px; box-shadow:4px 5px 0 rgba(36,48,74,.24); }
    button:active { transform:translate(3px, 3px); box-shadow:1px 2px 0 rgba(36,48,74,.24); }
    .hidden { display:none; }
  </style>
  <!-- Diese Datei ist komplett eigenständig: einfach per WhatsApp/Discord/E-Mail schicken und im Browser öffnen. -->
</head>

          p.vy = g.type === 'spring' ? -18.5 : -13.2;
          p.grounded = false; p.ground = null; p.blink = 8; s.shake = g.type === 'spring' ? 10 : 4;
          spawnPuffs(p.x, g.y+8, g.type === 'spring' ? 13 : 7);
        } else {
          p.vy = 0;
        }
      } else {
        p.grounded = false; p.ground = null;
      }
    }

    if (!p.grounded) p.vy += .44;
    p.x += p.vx; p.y += p.vy;
    if (p.x < -p.r) p.x = W+p.r; if (p.x > W+p.r) p.x = -p.r;

    if (!p.grounded) {
      for (const plat of s.platforms) {
        const falling = p.vy > 0;
        const feetY = p.y + p.r;
        const prevFeet = feetY - p.vy;
        if (falling && prevFeet <= plat.y+8 && feetY >= plat.y && p.x > plat.x-14 && p.x < plat.x+plat.w+14) {
          if (plat.type === 'bad') { gameOver(); return; }
          p.y = plat.y - p.r; p.vy = 0; p.grounded = true; p.ground = plat; plat.touched = true;
          spawnPuffs(p.x, plat.y+8, 4);
          break;
        }
      }
    }
    for (const star of s.stars) if (!star.got && Math.hypot(p.x-star.x, p.y-star.y) < p.r + star.r + 5) { star.got = true; s.score += 120; spawnPuffs(star.x, star.y, 10, colors.gold); }

    if (p.y < H*.42) {
      const dy = H*.42 - p.y; p.y += dy; s.camera += dy; for (const plat of s.platforms) plat.y += dy; for (const star of s.stars) star.y += dy; for (const puff of s.puffs) puff.y += dy; for (const cloud of s.clouds) cloud.y += dy*.28;
    }
    s.highest = Math.max(s.highest, Math.floor(s.camera)); s.score = Math.max(s.score, s.highest); scoreEl.textContent = Math.floor(s.score);
    while (s.platforms.length && s.platforms[0].y > H+70) s.platforms.shift();
    while (s.stars.length && s.stars[0].y > H+70) s.stars.shift();
    let top = Math.min(...s.platforms.map(pl=>pl.y));
    while (top > -80) { top -= rnd(58, Math.max(70, 96 - s.score/900)); addPlatform(top); }
    for (const puff of s.puffs) { puff.x += puff.vx; puff.y += puff.vy; puff.vy += .03; puff.life--; }
    s.puffs = s.puffs.filter(f=>f.life>0);
    for (const cloud of s.clouds) { cloud.y += .18*cloud.s; cloud.x += Math.sin(s.time*.3+cloud.s)*.08; if (cloud.y>H+90) { cloud.y=-90; cloud.x=rnd(-80,W); } }
    s.shake = Math.max(0, s.shake-.75);
    if (p.y - p.r > H + 40) gameOver();
  }

  function spawnPuffs(x,y,n,col='#ffffff'){ for (let i=0;i<n;i++) state.puffs.push({x:x+rnd(-16,16), y:y+rnd(-6,8), vx:rnd(-1.8,1.8), vy:rnd(-1.7,.2), r:rnd(3,9), life:rnd(18,36), col}); }
  function gameOver(){ state.over=true; state.running=false; menu.classList.remove('hidden'); menu.querySelector('h1').textContent='Game Over'; menu.querySelector('p').innerHTML='Score: <b>'+Math.floor(state.score)+'</b><br>Drücke Start oder Leertaste für eine neue Runde.'; startBtn.textContent='Nochmal'; }

  function draw(){
    const s=state; ctx.save(); const sh=s.shake?rnd(-s.shake,s.shake):0; ctx.translate(sh, -sh*.35);
    drawBackground();
    for (const star of s.stars) if(!star.got) drawStar(star.x, star.y, star.r, star.spin+s.time*2);
    for (const plat of s.platforms) drawPlatform(plat);
    for (const puff of s.puffs) { ctx.globalAlpha = Math.max(0, puff.life/32); blob(puff.x,puff.y,puff.r,puff.col, colors.ink, 1.5); ctx.globalAlpha=1; }
    drawPlayer(s.player); ctx.restore();
  }

  function drawBackground(){
    const grd = ctx.createLinearGradient(0,0,0,H); grd.addColorStop(0,'#74cdfd'); grd.addColorStop(.55,'#c9f3ff'); grd.addColorStop(1,'#fff4d8'); ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,.33)'; ctx.lineWidth=2; for(let y=-20;y<H;y+=46){ ctx.beginPath(); for(let x=0;x<=W;x+=26){ const yy=y+Math.sin((x+state.time*20)*.025+y*.03)*5; x?ctx.lineTo(x,yy):ctx.moveTo(x,yy);} ctx.stroke(); }
    for(const c of state.clouds){ ctx.globalAlpha=c.a; blob(c.x,c.y,42*c.s,'#ffffff','transparent',0); blob(c.x+34*c.s,c.y+9*c.s,32*c.s,'#ffffff','transparent',0); blob(c.x-30*c.s,c.y+12*c.s,27*c.s,'#ffffff','transparent',0); ctx.globalAlpha=1; }
  }

  function drawPlatform(p){
    ctx.save(); if(p.touched){ ctx.translate(0, Math.sin(state.time*25+p.phase)*2); p.touched=false; }
    const fill = p.type==='bad'?colors.coral:p.type==='spring'?colors.gold:p.type==='moving'?colors.purple:colors.mint;
    rounded(p.x,p.y,p.w,p.h,12,fill,colors.ink,3); ctx.fillStyle='rgba(255,255,255,.45)'; rounded(p.x+10,p.y+4,p.w-20,5,4,'rgba(255,255,255,.42)','transparent',0);
    if(p.type==='bad'){ ctx.fillStyle=colors.ink; for(let x=p.x+12;x<p.x+p.w;x+=18){ triangle(x,p.y-13,x-8,p.y+1,x+8,p.y+1); } }
    if(p.type==='spring'){ ctx.strokeStyle=colors.ink; ctx.lineWidth=3; ctx.beginPath(); for(let i=0;i<6;i++){ const x=p.x+p.w/2-20+i*8; const y=p.y-2-(i%2)*12; i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke(); }
    ctx.restore();
  }
  function drawPlayer(p){
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.strokeStyle=colors.coral; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-17,38); ctx.lineTo(-27,53); ctx.moveTo(17,38); ctx.lineTo(27,53); ctx.stroke();
    ctx.shadowColor='rgba(36,48,74,.25)'; ctx.shadowBlur=8; ctx.shadowOffsetY=4;
    ctx.beginPath(); ctx.ellipse(0,0,43,47,0,0,Math.PI*2); ctx.fillStyle='#fff8e8'; ctx.fill();
    ctx.shadowColor='transparent';
    ctx.save(); ctx.beginPath(); ctx.ellipse(0,0,40,44,0,0,Math.PI*2); ctx.clip();
    if (playerImg.complete && playerImg.naturalWidth) {
      const iw=playerImg.naturalWidth, ih=playerImg.naturalHeight;
      // Better crop: keep the hair, glasses and chin visible instead of zooming only into the face.
      ctx.drawImage(playerImg, 0, 0, iw, ih*.82, -34, -44, 68, 88);
    } else {
      ctx.fillStyle='#111'; ctx.fillRect(-40,-44,80,88);
    }
    ctx.restore();
    ctx.strokeStyle=colors.ink; ctx.lineWidth=4; ctx.beginPath(); ctx.ellipse(0,0,43,47,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  function drawStar(x,y,r,rot){ ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.fillStyle=colors.gold; ctx.strokeStyle=colors.ink; ctx.lineWidth=2.5; ctx.beginPath(); for(let i=0;i<10;i++){ const rr=i%2?r*.45:r; const a=-Math.PI/2+i*Math.PI/5; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); } ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore(); }
  function rounded(x,y,w,h,r,fill,stroke,lw){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fillStyle=fill; ctx.fill(); if(lw){ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke();} }
  function blob(x,y,r,fill,stroke,lw){ ctx.beginPath(); ctx.ellipse(x,y,r*1.05,r*.82,0,0,Math.PI*2); ctx.fillStyle=fill; ctx.fill(); if(lw){ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke();} }
  function triangle(x1,y1,x2,y2,x3,y3){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill(); }
  function loop(){ if(!state.running) return; update(); draw(); raf=requestAnimationFrame(loop); }

  addEventListener('keydown', e=>{ if(e.key===' ' || e.code==='Space') { e.preventDefault(); keys.add('Jump'); if(!state || !state.running) reset(); } else keys.add(e.key); });
  addEventListener('keyup', e=>{ if(e.key===' ' || e.code==='Space') { e.preventDefault(); keys.delete('Jump'); } else keys.delete(e.key); });
  startBtn.addEventListener('click', reset);
  reset(); state.running=false; cancelAnimationFrame(raf); draw(); menu.classList.remove('hidden');
})();
</script>
</body>
</html>
